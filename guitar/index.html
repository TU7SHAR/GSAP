<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Guitar Strings</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.13.0/gsap.min.js"></script>
    <link rel="stylesheet" href="style.css" />
    <script src="script.js" defer></script>
  </head>
  <body>
    <main id="main">
      <div id="string-container">
        <svg
          id="guitar-svg"
          class="bordering"
          viewBox="0 0 1000 600"
          preserveAspectRatio="none"
        >
          <g class="string-group">
            <path
              class="string"
              data-y="50"
              d="M 0 50 Q 500 50 1000 50"
              stroke="white"
              fill="transparent"
              stroke-width="2"
            />
            <path
              class="hit-area"
              d="M 0 50 Q 500 50 1000 50"
              stroke="transparent"
              fill="transparent"
              stroke-width="40"
            />
          </g>
          <g class="string-group">
            <path
              class="string"
              data-y="150"
              d="M 0 150 Q 500 150 1000 150"
              stroke="white"
              fill="transparent"
              stroke-width="2"
            />
            <path
              class="hit-area"
              d="M 0 150 Q 500 150 1000 150"
              stroke="transparent"
              fill="transparent"
              stroke-width="40"
            />
          </g>
          <g class="string-group">
            <path
              class="string"
              data-y="250"
              d="M 0 250 Q 500 250 1000 250"
              stroke="white"
              fill="transparent"
              stroke-width="2"
            />
            <path
              class="hit-area"
              d="M 0 250 Q 500 250 1000 250"
              stroke="transparent"
              fill="transparent"
              stroke-width="40"
            />
          </g>
          <g class="string-group">
            <path
              class="string"
              data-y="350"
              d="M 0 350 Q 500 350 1000 350"
              stroke="white"
              fill="transparent"
              stroke-width="2"
            />
            <path
              class="hit-area"
              d="M 0 350 Q 500 350 1000 350"
              stroke="transparent"
              fill="transparent"
              stroke-width="40"
            />
          </g>
          <g class="string-group">
            <path
              class="string"
              data-y="450"
              d="M 0 450 Q 500 450 1000 450"
              stroke="white"
              fill="transparent"
              stroke-width="2"
            />
            <path
              class="hit-area"
              d="M 0 450 Q 500 450 1000 450"
              stroke="transparent"
              fill="transparent"
              stroke-width="40"
            />
          </g>
          <g class="string-group">
            <path
              class="string"
              data-y="550"
              d="M 0 550 Q 500 550 1000 550"
              stroke="white"
              fill="transparent"
              stroke-width="2"
            />
            <path
              class="hit-area"
              d="M 0 550 Q 500 550 1000 550"
              stroke="transparent"
              fill="transparent"
              stroke-width="40"
            />
          </g>
        </svg>
      </div>
    </main>
  </body>
</html>
